services:
    php:
        build: .
        container_name: cafe_ccib38_backend_php
        ports:
            - "19740:8000"
        volumes:
            - .:/app
        working_dir: /app
        depends_on:
            - database
        command: php -S 0.0.0.0:8000 -t public

    database:
        image: postgres:16
        container_name: cafe_ccib38_backend_postgres
        ports:
            - "13432:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - cafe_ccib38_backend_postgres_data:/var/lib/postgresql/data

volumes:
    cafe_ccib38_backend_postgres_data:
